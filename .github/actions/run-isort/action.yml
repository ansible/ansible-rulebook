name: run-isort
description: run isort

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: "3.10"

    - name: Install dependencies
      shell: bash
      run: python -m pip install isort

    - name: Lint with isort
      shell: bash
      run: isort . --check --diff
