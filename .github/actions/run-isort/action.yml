name: run-isort
description: run isort

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.0.0
      with:
        python-version: "3.10"

    - name: Install dependencies
      shell: bash
      run: python -m pip install isort

    - name: Lint with isort
      shell: bash
      run: isort . --check --diff
