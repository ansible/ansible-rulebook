name: run-isort
description: run isort

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.10"

    - name: Install dependencies
      shell: bash
      run: python -m pip install isort

    - name: Lint with isort
      shell: bash
      run: isort . --check --diff
