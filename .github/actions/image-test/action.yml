name: build-and-test-image
description: Build and test the container image

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: 3.11

    - name: Get package version
      shell: bash
      run: |
        python -m pip install setuptools_scm
        echo "SETUPTOOLS_SCM_PRETEND_VERSION=$(python -m setuptools_scm)" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2.10.0

    - name: Build container image
      uses: docker/build-push-action@0a97817b6ade9f46837855d676c4cca3a2471fc9 # v4.2.1
      with:
        context: .
        platforms: linux/amd64
        tags: localhost/ansible-rulebook:test
        load: true
        build-args: |
          SETUPTOOLS_SCM_PRETEND_VERSION=${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}

    - name: Run tests
      shell: bash
      run: >
        docker run --rm -v $PWD:/app/rulebook localhost/ansible-rulebook:test bash -c '
        cd /app/rulebook &&
        export PATH=/app/.local/bin:$PATH &&
        pip3 install -r requirements_test.txt &&
        pytest -m "e2e" -n auto'
