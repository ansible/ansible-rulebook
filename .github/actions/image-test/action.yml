name: build-and-test-image
description: Build and test the container image

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: 3.11

    - name: Get package version
      shell: bash
      run: |
        python -m pip install setuptools_scm
        echo "SETUPTOOLS_SCM_PRETEND_VERSION=$(python -m setuptools_scm)" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build container image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: linux/amd64
        tags: localhost/ansible-rulebook:test
        load: true
        build-args: |
          SETUPTOOLS_SCM_PRETEND_VERSION=${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}

    - name: Run tests
      shell: bash
      run: >
        docker run --rm -v $PWD:/app/rulebook localhost/ansible-rulebook:test bash -c '
        cd /app/rulebook &&
        export PATH=/app/.local/bin:$PATH &&
        pip3 install -r requirements_test.txt &&
        pytest -m "e2e" -n auto'
